<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CiciZeka - AI Asistan</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img src="/static/img/logo.svg" alt="CiciZeka" class="logo-icon" style="width:32px;height:32px;border-radius:6px;" />
          <span class="logo-text">CiciZeka</span>
        </div>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <span>+</span> Yeni Sohbet
      </button>
      <div class="memory-panel">
        <div class="memory-header">
          <span>🧠 Hafıza</span>
          <button class="clear-memory-btn" onclick="clearMemory()" title="Hafızayı temizle">Temizle</button>
        </div>
        <div class="memory-list" id="memoryList">
          <p class="memory-empty">Henüz bir şey öğrenmedim.</p>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="status-badge" id="statusBadge">
          <span class="status-dot"></span>
          <span id="statusText">Bağlanıyor...</span>
        </div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-area">
      <div class="chat-header">
        <div class="chat-header-info">
          <h2>CiciZeka ile Sohbet</h2>
          <p class="chat-subtitle">Yapay zeka asistanınız</p>
        </div>
        <button class="voice-toggle" id="voiceToggle" onclick="toggleVoice()" title="Sesli yanıt: Kapalı">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </button>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">🧠</div>
          <h1>Merhaba! Ben CiciZeka</h1>
          <p>Size nasıl yardımcı olabilirim?</p>
          <div class="suggestion-grid">
            <button class="suggestion-btn" onclick="sendSuggestion('Kendini tanıt')">Kendini tanıt</button>
            <button class="suggestion-btn" onclick="sendSuggestion('Bugün nasılsın?')">Bugün nasılsın?</button>
            <button class="suggestion-btn" onclick="sendSuggestion('Bana bir şeyler öğret')">Bana bir şeyler öğret</button>
            <button class="suggestion-btn" onclick="sendSuggestion('Neler yapabilirsin?')">Neler yapabilirsin?</button>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)" />
        <div id="imagePreview" class="image-preview" style="display:none">
          <img id="previewImg" src="" alt="Önizleme" />
          <button class="remove-img-btn" onclick="removeImage()" title="Görseli kaldır">✕</button>
        </div>
        <div class="input-wrapper">
          <textarea
            id="userInput"
            placeholder="Bir şeyler yazın... (Enter ile gönderin, Shift+Enter ile satır ekleyin)"
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="img-btn" onclick="document.getElementById('imageInput').click()" title="Görsel ekle">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
            </svg>
          </button>
          <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Sesli giriş">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">CiciZeka hata yapabilir. Önemli bilgileri doğrulayın.</p>
      </div>
    </main>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
